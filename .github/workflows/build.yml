name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build application
      run: npm run build

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "ווידג'טים ${{ github.ref_name }}"
        body: |
          ## ווידג'טים ${{ github.ref_name }}

          ### התקנה
          1. הורד את קובץ ה-`.exe` מהרשימה למטה
          2. הפעל והתקן
          3. הכפתור יופיע על המסך

          ### [דף הורדה מלא](https://asdx-collab.github.io/Widgets-NF/)
        files: dist/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
